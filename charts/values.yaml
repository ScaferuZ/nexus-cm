replicaCount: 1

image:
  repository: sonatype/nexus3
  tag: "3.94.0"
  pullPolicy: IfNotPresent

serviceAccount:
  create: true
  name: "nexus"
  annotations: 
    iam.gke.io/gcp-service-account: nexus-gcs@nexus-502804.iam.gserviceaccount.com

service: 
  type: ClusterIP
  port: 8081 

persistence:
  enabled: true
  storageClassName: "standard-rwo"
  accessMode: ReadWriteOnce
  size: 20Gi

resources:
  requests:
    cpu: 50m
    memory: 1Gi
  limits:
    cpu: 750m
    memory: 2300Mi

nexus:
  gcpRegion: asia-southeast1
  javaMemory: 768m

podSecurityContext:
  fsGroup: 200
  fsGroupChangePolicy: OnRootMismatch

containerSecurityContext:
  runAsNonRoot: true
  runAsUser: 200
  runAsGroup: 200
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
